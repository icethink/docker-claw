services:
  openclaw:
    build: .
    container_name: docker-claw
    restart: unless-stopped
    ports:
      - "${SSH_PORT:-2222}:22"
    environment:
      - SSH_AUTHORIZED_KEYS=${SSH_AUTHORIZED_KEYS:-}
    volumes:
      # Read-write: OpenClaw config and workspace
      - ${RW_OPENCLAW_CONFIG:-./data/openclaw-config}:/home/openclaw/.openclaw
      # Read-only: host directories (comma-separated paths not supported, add more below as needed)
      - ${RO_VOLUME_1:-./data/readonly}:/mnt/shared:ro
      # SSH host keys (persist across rebuilds)
      - ${RW_SSH_HOST_KEYS:-./data/ssh-host-keys}:/etc/ssh/host_keys
