services:
  openclaw:
    build: .
    container_name: docker-claw
    restart: unless-stopped
    ports:
      - "2222:22"
    volumes:
      # Read-write: OpenClaw config and workspace
      - ./data/openclaw-config:/home/openclaw/.openclaw

      # SSH keys
      - ./data/ssh-host-keys:/etc/ssh/host_keys
      - ./data/authorized_keys:/home/openclaw/.ssh/authorized_keys:ro

      # === Add your volumes below ===
      # Read-only example:
      # - /host/path/to/data:/mnt/data:ro
      #
      # Read-write example:
      # - /host/path/to/shared:/mnt/shared
