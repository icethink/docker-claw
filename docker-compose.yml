services:
  openclaw:
    build: .
    container_name: docker-claw
    restart: unless-stopped
    ports:
      - "${SSH_PORT:-2222}:22"
    environment:
      - SSH_AUTHORIZED_KEYS=${SSH_AUTHORIZED_KEYS:-}
    volumes:
      # Read-write: OpenClaw config and workspace (persisted on host)
      - ./data/openclaw-config:/home/openclaw/.openclaw

      # SSH host keys (persist across rebuilds)
      - ./data/ssh-host-keys:/etc/ssh/host_keys

      # === Add your volumes below ===
      # Read-only example:
      # - /host/path/to/data:/mnt/data:ro
      #
      # Read-write example:
      # - /host/path/to/shared:/mnt/shared
